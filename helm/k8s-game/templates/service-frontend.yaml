apiVersion: v1
kind: Service
metadata:
  name: {{ include "k8s-game.frontend.fullname" . }}
  labels:
    {{- include "k8s-game.frontend.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.frontend.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "k8s-game.frontend.selectorLabels" . | nindent 4 }}
